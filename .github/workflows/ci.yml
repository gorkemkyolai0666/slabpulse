name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: slabpulse
          POSTGRES_PASSWORD: slabpulse123
          POSTGRES_DB: slabpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations and seed
        working-directory: backend
        env:
          DATABASE_URL: postgresql://slabpulse:slabpulse123@localhost:5432/slabpulse?schema=public
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run unit tests
        working-directory: backend
        run: npm test

      - name: Start API and run integration tests
        env:
          DATABASE_URL: postgresql://slabpulse:slabpulse123@localhost:5432/slabpulse?schema=public
          JWT_SECRET: slabpulse-ci-secret
          PORT: 4024
        run: |
          cd backend && npm run start:prod &
          sleep 5
          bash tests/integration.sh

  frontend:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4024/api
        run: npm run build

  provision:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Verify deployment secrets
        run: |
          test -n "${{ secrets.GH_PAT }}" && echo "GH_PAT=true" || echo "GH_PAT=false"
          test -n "${{ secrets.RAILWAY_API_TOKEN }}" && echo "RAILWAY_API_TOKEN=true" || echo "RAILWAY_API_TOKEN=false"
          test -n "${{ secrets.VERCEL_TOKEN }}" && echo "VERCEL_TOKEN=true" || echo "VERCEL_TOKEN=false"

      - name: Provision infrastructure
        env:
          PROJECT_NAME: ${{ github.event.repository.name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npm run provision
